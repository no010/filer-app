<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<title>filer · 统计</title>
<style>body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}</style>
</head><body>
<div class="flex h-screen flex-col">
  <header class="flex items-center justify-between border-b border-slate-200 bg-white px-4 py-2">
    <div class="flex items-center gap-2">
      <span class="text-base font-semibold text-slate-800">filer</span>
      <span class="text-xs text-slate-400">下载整理</span>
    </div>
    <div class="flex items-center gap-3 text-xs">
      <span class="text-slate-500">Peter</span>
      <button class="rounded bg-slate-100 px-2 py-1 text-slate-600">设置</button>
    </div>
  </header>
  <nav class="flex gap-1 border-b border-slate-200 bg-white px-4">
    <button class="-mb-px border-b-2 border-transparent px-3 py-2 text-sm text-slate-400">收件箱</button>
    <button class="-mb-px border-b-2 border-transparent px-3 py-2 text-sm text-slate-400">历史</button>
    <button class="-mb-px border-b-2 border-transparent px-3 py-2 text-sm text-slate-400">搜索</button>
    <button class="-mb-px border-b-2 border-transparent px-3 py-2 text-sm text-slate-400">回顾 · 3</button>
    <button class="-mb-px border-b-2 border-slate-800 px-3 py-2 text-sm text-slate-800">统计</button>
  </nav>
  <div class="h-full overflow-y-auto bg-slate-50 p-4">
    <div class="grid grid-cols-4 gap-3">
      <div class="rounded-lg border border-slate-200 bg-white p-3"><div class="text-xs text-slate-500">已归档</div><div class="text-2xl font-semibold text-slate-800">128</div></div>
      <div class="rounded-lg border border-slate-200 bg-white p-3"><div class="text-xs text-slate-500">收件箱待办</div><div class="text-2xl font-semibold text-slate-800">3</div></div>
      <div class="rounded-lg border border-slate-200 bg-white p-3"><div class="text-xs text-slate-500">近 7 天归档</div><div class="text-2xl font-semibold text-slate-800">12</div></div>
      <div class="rounded-lg border border-orange-200 bg-orange-50 p-3"><div class="text-xs text-slate-500">待清理(&gt;180天)</div><div class="text-2xl font-semibold text-orange-700">3</div></div>
    </div>
    <div class="mt-4 rounded-lg border border-slate-200 bg-white p-3">
      <h3 class="mb-2 text-xs font-semibold text-slate-500">按分类</h3>
      <div class="space-y-1.5">
        <div class="flex items-center gap-2 text-xs"><span class="w-28 truncate text-slate-600">Datasheet</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-slate-700" style="width:80%;height:14px"></div></div><span class="w-8 text-right text-slate-500">42</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-28 truncate text-slate-600">Software</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-slate-700" style="width:55%;height:14px"></div></div><span class="w-8 text-right text-slate-500">29</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-28 truncate text-slate-600">Receipt</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-slate-700" style="width:40%;height:14px"></div></div><span class="w-8 text-right text-slate-500">21</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-28 truncate text-slate-600">Document</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-slate-700" style="width:30%;height:14px"></div></div><span class="w-8 text-right text-slate-500">16</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-28 truncate text-slate-600">Screenshot</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-slate-700" style="width:24%;height:14px"></div></div><span class="w-8 text-right text-slate-500">12</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-28 truncate text-slate-600">Archive</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-slate-700" style="width:16%;height:14px"></div></div><span class="w-8 text-right text-slate-500">8</span></div>
      </div>
    </div>
    <div class="mt-4 rounded-lg border border-slate-200 bg-white p-3">
      <h3 class="mb-2 text-xs font-semibold text-slate-500">陈旧度分布</h3>
      <div class="space-y-1.5">
        <div class="flex items-center gap-2 text-xs"><span class="w-32 text-slate-600">&lt;30天 近期</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-emerald-400" style="width:55%;height:14px"></div></div><span class="w-8 text-right text-slate-500">71</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-32 text-slate-600">30-90 未用</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-slate-300" style="width:25%;height:14px"></div></div><span class="w-8 text-right text-slate-500">32</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-32 text-slate-600">90-180 久未打开</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-amber-400" style="width:14%;height:14px"></div></div><span class="w-8 text-right text-slate-500">18</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-32 text-slate-600">180-365 建议清理</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-orange-400" style="width:5%;height:14px"></div></div><span class="w-8 text-right text-slate-500">5</span></div>
        <div class="flex items-center gap-2 text-xs"><span class="w-32 text-slate-600">&gt;365 很可能不需要</span><div class="flex-1 rounded bg-slate-100"><div class="rounded bg-red-400" style="width:2%;height:14px"></div></div><span class="w-8 text-right text-slate-500">2</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
