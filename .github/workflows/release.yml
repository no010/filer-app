name: release

# Build filer for macOS / Windows / Linux on a `v*` tag push and attach the
# installers to a GitHub Release. filer is a Tauri 2 app at repo root.
#
# To cut a release: `git tag v0.1.0 && git push origin v0.1.0`.
# Manual run: Actions tab → release → Run workflow (builds without releasing).
#
# macOS signing/notarization is OPTIONAL — fill the Apple secrets below and
# the build will sign; otherwise it ships an unsigned .dmg (users right-click
# → Open the first time). Windows ships an unsigned NSIS/MSI by default; to
# sign, add a code-signing cert (out of scope here).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed by tauri-action to create the Release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary needs both Apple arches.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps (webkit2gtk-4.1)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            patchelf libssl-dev librsvg2-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        working-directory: ui
        run: npm ci

      - name: Install Tauri CLI globally (so the action's `tauri` is on PATH)
        run: npm i -g @tauri-apps/cli@^2

      # Optional Apple signing/notarization. Secrets not set → unsigned build.
      - name: Set Apple signing env
        if: matrix.platform == 'macos-latest' && github.event_name == 'push'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: echo "Apple signing env wired (no-op if secrets empty)."

      - uses: tauri-apps/tauri-action@v0
        env:
          # Forward Apple signing secrets to the action (only used if present).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "filer ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install. macOS: .dmg (unsigned → right-click → Open first time). Windows: .exe (NSIS) / .msi. Linux: .AppImage / .deb."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
